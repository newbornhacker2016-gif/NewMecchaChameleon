name: Sync to SourceForge

on:
  push:
    branches: [ main ]

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to SourceForge
        uses: s0/git-publish-subdir-action@v2.6.0
       env:
          REPO: ssh://gltechsupport@git.code.sf.net/p/newmecchachameleon/code
          BRANCH: main
          FOLDER: .
          SSH_PRIVATE_KEY: ${{ secrets.SF_SSH_KEY }}
